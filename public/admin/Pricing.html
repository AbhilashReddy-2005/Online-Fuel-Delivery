<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pricing Management - FuelDelivery Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {--sidebar-bg: #1a2744; --sidebar-width: 220px; --accent-blue: #2563eb; --card-radius: 14px; --font: 'Poppins', sans-serif;}
* {margin: 0; padding: 0; box-sizing: border-box;}
body {font-family: var(--font); background: #f0f4f8; display: flex; min-height: 100vh; font-size: 14px;}
.sidebar {width: var(--sidebar-width); background: var(--sidebar-bg); min-height: 100vh; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 100;}
.logo {display: flex; align-items: center; gap: 10px; padding: 22px 20px; border-bottom: 1px solid rgba(255,255,255,0.07); cursor: pointer;}
.logo-icon {width: 36px; height: 36px; background: linear-gradient(135deg, #2563eb, #06b6d4); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px;}
.logo-text {color: #fff; font-weight: 700; font-size: 16px;}
.nav {flex: 1; padding: 16px 0;}
.nav-item {display: flex; align-items: center; gap: 12px; padding: 11px 20px; color: rgba(255,255,255,0.6); cursor: pointer; transition: all 0.2s; font-size: 13.5px; font-weight: 500; border-left: 3px solid transparent;}
.nav-item:hover {color: #fff; background: rgba(255,255,255,0.06);}
.nav-item.active {color: #fff; background: rgba(37,99,235,0.2); border-left-color: #2563eb;}
.main {margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column;}
.topbar {background: #fff; padding: 0 28px; height: 62px; display: flex; align-items: center; gap: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); position: sticky; top: 0; z-index: 50;}
.topbar-title {font-size: 16px; font-weight: 600; color: #1e293b; flex: 1;}
.avatar {width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, #2563eb, #06b6d4); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 600; cursor: pointer;}
.content {padding: 28px; flex: 1; overflow-y: auto;}
.page-header {display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px;}
.page-title {font-size: 24px; font-weight: 700; color: #1e293b;}
.btn {padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-family: var(--font); font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 6px; transition: all 0.2s;}
.btn-primary {background: linear-gradient(135deg, #2563eb, #1d4ed8); color: #fff;}
.btn-primary:hover {transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37,99,235,0.35);}
.filters-card {background: #fff; border-radius: var(--card-radius); padding: 20px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; align-items: flex-end;}
.filter-group {display: flex; flex-direction: column; gap: 6px;}
.filter-label {font-size: 12px; font-weight: 600; color: #64748b; text-transform: uppercase;}
.filter-input, .filter-select {padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-family: var(--font); font-size: 13px;}
.filter-input:focus, .filter-select:focus {outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1);}
.table-card {background: #fff; border-radius: var(--card-radius); box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden;}
table {width: 100%; border-collapse: collapse;}
thead {background: #f8fafc; border-bottom: 1px solid #e2e8f0;}
th {padding: 14px 18px; text-align: left; font-size: 12px; font-weight: 600; color: #64748b; text-transform: uppercase;}
tbody tr {border-bottom: 1px solid #e2e8f0; transition: background 0.2s;}
tbody tr:hover {background: #f8fafc;}
td {padding: 14px 18px; font-size: 13px; color: #1e293b;}
.badge {display: inline-flex; align-items: center; padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 600;}
.badge-available {background: #dcfce7; color: #166534;}
.badge-in-transit {background: #dbeafe; color: #1e40af;}
.badge-maintenance {background: #fef3c7; color: #92400e;}
.action-buttons {display: flex; gap: 8px;}
.action-btn {padding: 6px 12px; border: none; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 4px;}
.btn-edit {background: #fef3c7; color: #92400e;}
.btn-delete {background: #fee2e2; color: #991b1b;}
.modal {display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;}
.modal.active {display: flex;}
.modal-content {background: #fff; border-radius: var(--card-radius); padding: 28px; max-width: 600px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-height: 90vh; overflow-y: auto;}
.modal-title {font-size: 20px; font-weight: 700; margin-bottom: 20px; color: #1e293b;}
.form-group {margin-bottom: 16px; display: flex; flex-direction: column; gap: 6px;}
.form-label {font-size: 12px; font-weight: 600; color: #64748b;}
.form-input, .form-select {padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-family: var(--font); font-size: 13px;}
.form-input:focus, .form-select:focus {outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1);}
.form-row {display: grid; grid-template-columns: 1fr 1fr; gap: 16px;}
.modal-buttons {display: flex; gap: 12px; margin-top: 24px;}
.pagination-bar {padding: 16px 18px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #e2e8f0;}
.pagination-buttons {display: flex; gap: 8px;}
.pagination-btn {padding: 6px 12px; border: 1px solid #e2e8f0; background: #fff; border-radius: 6px; cursor: pointer; font-family: var(--font); color: #64748b;}
.pagination-btn:hover {border-color: #2563eb; color: #2563eb;}
.pagination-btn.active {background: #2563eb; color: #fff;}
.empty-state {text-align: center; padding: 60px 20px; color: #64748b;}
@keyframes slideIn {from {transform: translateX(400px); opacity: 0;} to {transform: translateX(0); opacity: 1;}}
@keyframes slideOut {from {transform: translateX(0); opacity: 1;} to {transform: translateX(400px); opacity: 0;}}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="logo" onclick="goHome()">
    <div class="logo-icon"><i class="fa-solid fa-truck-fast"></i></div>
    <span class="logo-text">FuelDelivery</span>
  </div>
  <nav class="nav">
    <div class="nav-item" onclick="goHome()"><i class="fa-solid fa-gauge-high"></i> Dashboard</div>
    <div class="nav-item" onclick="navigateTo('orders')"><i class="fa-solid fa-box"></i> Orders</div>
    <div class="nav-item" onclick="navigateTo('drivers')"><i class="fa-solid fa-user-tie"></i> Drivers</div>
    <div class="nav-item" onclick="navigateTo('customers')"><i class="fa-solid fa-users"></i> Customers</div>
    <div class="nav-item" onclick="navigateTo('inventory')"><i class="fa-solid fa-warehouse"></i> Inventory</div>
    <div class="nav-item active"><i class="fa-solid fa-tags"></i> Fleet</div>
    <div class="nav-item" onclick="navigateTo('payments')"><i class="fa-solid fa-credit-card"></i> Payments</div>
    <div class="nav-item" onclick="navigateTo('pricing')"><i class="fa-solid fa-tags"></i> Pricing</div>
  </nav>
</aside>

<div class="main">
  <div class="topbar">
    <span class="topbar-title"><i class="fa-solid fa-tags"></i> Pricing Management</span>
    <div class="avatar" onclick="handleLogout()">A</div>
  </div>

  <div class="content">
    <div class="page-header">
      <h1 class="page-title">Fleet</h1>
      <button class="btn btn-primary" onclick="openAddModal()"><i class="fa-solid fa-plus"></i> Add Vehicle</button>
    </div>

    <div class="filters-card">
      <div class="filter-group">
        <label class="filter-label">Search</label>
        <input type="text" class="filter-input" id="searchInput" placeholder="Search vehicle number..." onkeyup="filterData()">
      </div>
      <div class="filter-group">
        <label class="filter-label">Status</label>
        <select class="filter-select" id="statusFilter" onchange="filterData()">
          <option value="">All Status</option>
          <option value="available">Available</option>
          <option value="in-transit">In Transit</option>
          <option value="maintenance">Maintenance</option>
        </select>
      </div>
      <button class="btn" style="background: #f1f5f9; color: #64748b;" onclick="resetFilters()"><i class="fa-solid fa-redo"></i> Reset</button>
    </div>

    <div class="table-card">
      <div style="overflow-x: auto;">
        <table id="fleetTable">
          <thead>
            <tr>
              <th>Vehicle Number</th>
              <th>Type</th>
              <th>Capacity (L)</th>
              <th>Fuel Type</th>
              <th>Driver</th>
              <th>Current Fuel</th>
              <th>Mileage</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="pagination-bar">
        <span id="rowsInfo">Showing 0 vehicles</span>
        <div class="pagination-buttons">
          <button class="pagination-btn" onclick="previousPage()">← Previous</button>
          <button class="pagination-btn active" id="page1" onclick="changePage(1)">1</button>
          <button class="pagination-btn" id="page2" onclick="changePage(2)">2</button>
          <button class="pagination-btn" onclick="nextPage()">Next →</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-title" id="modalTitle">Add Vehicle</div>
    
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Vehicle Number *</label>
        <input type="text" class="form-input" id="vehicleNumber" placeholder="e.g., TN01AB1234" required>
      </div>
      <div class="form-group">
        <label class="form-label">Type *</label>
        <select class="form-select" id="type" required>
          <option value="">Select Type</option>
          <option value="tanker">Tanker</option>
          <option value="truck">Truck</option>
          <option value="van">Van</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Capacity (L) *</label>
        <input type="number" class="form-input" id="capacity" placeholder="e.g., 5000" required>
      </div>
      <div class="form-group">
        <label class="form-label">Fuel Type *</label>
        <select class="form-select" id="fuelType" required>
          <option value="">Select Fuel</option>
          <option value="petrol">Petrol</option>
          <option value="diesel">Diesel</option>
          <option value="lpg">LPG</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Driver Assigned</label>
        <input type="text" class="form-input" id="driverAssigned" placeholder="Driver name">
      </div>
      <div class="form-group">
        <label class="form-label">Current Fuel (L)</label>
        <input type="number" class="form-input" id="currentFuel" placeholder="e.g., 4000">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Mileage (km)</label>
        <input type="number" class="form-input" id="mileage" placeholder="e.g., 50000">
      </div>
      <div class="form-group">
        <label class="form-label">Status *</label>
        <select class="form-select" id="status" required>
          <option value="">Select Status</option>
          <option value="available">Available</option>
          <option value="in-transit">In Transit</option>
          <option value="maintenance">Maintenance</option>
        </select>
      </div>
    </div>

    <div class="modal-buttons">
      <button class="btn btn-primary" onclick="saveFleet()"><i class="fa-solid fa-save"></i> Save</button>
      <button class="btn" style="background: #f1f5f9; color: #64748b;" onclick="closeModal()"><i class="fa-solid fa-times"></i> Cancel</button>
    </div>
  </div>
</div>

<script>
let allFleet = [];
let filteredFleet = [];
let currentPage = 1;
const itemsPerPage = 10;
let currentEditId = null;

document.addEventListener("DOMContentLoaded", function() {
  checkAuth();
  loadFleet();
});

function checkAuth() {
  if (!localStorage.getItem("adminToken")) {
    window.location.href = "/admin-login.html";
  }
}

async function loadFleet() {
  try {
    const response = await fetch("/api/fleet");
    const result = await response.json();
    allFleet = result.data || [];
    filteredFleet = [...allFleet];
    renderTable();
  } catch (err) {
    showNotification("Error loading fleet", "error");
  }
}

function renderTable() {
  const tbody = document.getElementById("tableBody");
  const start = (currentPage - 1) * itemsPerPage;
  const end = start + itemsPerPage;
  const pageData = filteredFleet.slice(start, end);

  if (pageData.length === 0) {
    tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:40px"><div class="empty-state">📭 No vehicles found</div></td></tr>`;
    return;
  }

  tbody.innerHTML = pageData.map(vehicle => {
    let statusBadge = 'badge-available';
    if (vehicle.status === "in-transit") statusBadge = 'badge-in-transit';
    if (vehicle.status === "maintenance") statusBadge = 'badge-maintenance';

    return `
      <tr>
        <td><strong>${vehicle.vehicleNumber}</strong></td>
        <td>${vehicle.type.charAt(0).toUpperCase() + vehicle.type.slice(1)}</td>
        <td>${vehicle.capacity}L</td>
        <td>${vehicle.fuelType}</td>
        <td>${vehicle.driverAssigned || '-'}</td>
        <td>${vehicle.currentFuel || 0}L</td>
        <td>${vehicle.mileage || 0}km</td>
        <td><span class="badge ${statusBadge}">${vehicle.status}</span></td>
        <td>
          <div class="action-buttons">
            <button class="action-btn btn-edit" onclick="editFleet('${vehicle._id}')"><i class="fa-solid fa-edit"></i></button>
            <button class="action-btn btn-delete" onclick="deleteFleet('${vehicle._id}')"><i class="fa-solid fa-trash"></i></button>
          </div>
        </td>
      </tr>
    `;
  }).join("");

  updatePagination();
}

function updatePagination() {
  const totalPages = Math.ceil(filteredFleet.length / itemsPerPage);
  const start = (currentPage - 1) * itemsPerPage + 1;
  const end = Math.min(currentPage * itemsPerPage, filteredFleet.length);
  
  document.getElementById("rowsInfo").textContent = `Showing ${start} to ${end} of ${filteredFleet.length} vehicles`;
  
  document.getElementById("page1").classList.toggle("active", currentPage === 1);
  document.getElementById("page2").classList.toggle("active", currentPage === 2);
  document.getElementById("page2").style.display = totalPages >= 2 ? "block" : "none";
}

function filterData() {
  const search = document.getElementById("searchInput").value.toLowerCase();
  const status = document.getElementById("statusFilter").value;

  filteredFleet = allFleet.filter(vehicle => {
    const matchSearch = vehicle.vehicleNumber.toLowerCase().includes(search);
    const matchStatus = !status || vehicle.status === status;
    return matchSearch && matchStatus;
  });

  currentPage = 1;
  renderTable();
}

function resetFilters() {
  document.getElementById("searchInput").value = "";
  document.getElementById("statusFilter").value = "";
  filteredFleet = [...allFleet];
  currentPage = 1;
  renderTable();
}

function previousPage() {
  if (currentPage > 1) {
    currentPage--;
    renderTable();
  }
}

function nextPage() {
  const totalPages = Math.ceil(filteredFleet.length / itemsPerPage);
  if (currentPage < totalPages) {
    currentPage++;
    renderTable();
  }
}

function changePage(page) {
  currentPage = page;
  renderTable();
}

function openAddModal() {
  currentEditId = null;
  document.getElementById("modalTitle").textContent = "Add Vehicle";
  clearForm();
  document.getElementById("modal").classList.add("active");
}

function editFleet(id) {
  const vehicle = allFleet.find(v => v._id === id);
  if (!vehicle) return;
  
  currentEditId = id;
  document.getElementById("modalTitle").textContent = "Edit Vehicle";
  document.getElementById("vehicleNumber").value = vehicle.vehicleNumber;
  document.getElementById("type").value = vehicle.type;
  document.getElementById("capacity").value = vehicle.capacity;
  document.getElementById("fuelType").value = vehicle.fuelType;
  document.getElementById("driverAssigned").value = vehicle.driverAssigned || "";
  document.getElementById("currentFuel").value = vehicle.currentFuel || "";
  document.getElementById("mileage").value = vehicle.mileage || "";
  document.getElementById("status").value = vehicle.status;
  document.getElementById("modal").classList.add("active");
}

function clearForm() {
  document.getElementById("vehicleNumber").value = "";
  document.getElementById("type").value = "";
  document.getElementById("capacity").value = "";
  document.getElementById("fuelType").value = "";
  document.getElementById("driverAssigned").value = "";
  document.getElementById("currentFuel").value = "";
  document.getElementById("mileage").value = "";
  document.getElementById("status").value = "";
}

async function saveFleet() {
  const formData = {
    vehicleNumber: document.getElementById("vehicleNumber").value,
    type: document.getElementById("type").value,
    capacity: Number(document.getElementById("capacity").value),
    fuelType: document.getElementById("fuelType").value,
    driverAssigned: document.getElementById("driverAssigned").value,
    currentFuel: Number(document.getElementById("currentFuel").value) || 0,
    mileage: Number(document.getElementById("mileage").value) || 0,
    status: document.getElementById("status").value,
  };

  if (!formData.vehicleNumber || !formData.type || !formData.capacity || !formData.fuelType || !formData.status) {
    showNotification("Please fill all required fields", "error");
    return;
  }

  try {
    let response;
    if (currentEditId) {
      response = await fetch(`/api/fleet/${currentEditId}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(formData),
      });
    } else {
      response = await fetch("/api/fleet", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(formData),
      });
    }

    const result = await response.json();
    if (result.success) {
      showNotification(currentEditId ? "Vehicle updated!" : "Vehicle added!", "success");
      closeModal();
      loadFleet();
    } else {
      showNotification(result.message || "Error saving vehicle", "error");
    }
  } catch (err) {
    showNotification("Error saving vehicle", "error");
  }
}

async function deleteFleet(id) {
  if (!confirm("Delete this vehicle?")) return;

  try {
    const response = await fetch(`/api/fleet/${id}`, { method: "DELETE" });
    const result = await response.json();
    if (result.success) {
      showNotification("Vehicle deleted!", "success");
      loadFleet();
    } else {
      showNotification("Error deleting vehicle", "error");
    }
  } catch (err) {
    showNotification("Error deleting vehicle", "error");
  }
}

function closeModal() {
  document.getElementById("modal").classList.remove("active");
}

function goHome() {
  window.location.href = "/admin/admin-dashboard.html";
}

function navigateTo(page) {
  if (page === "reports") {
    window.location.href = `/admin/reports.html`;
  } else if (page === "tracking") {
    window.location.href = `/admin/tracking.html`;
  } else {
    window.location.href = `/admin/manage-${page}.html`;
  }
}

function handleLogout() {
  if (confirm("Logout?")) {
    localStorage.removeItem("adminToken");
    window.location.href = "/admin-login.html";
  }
}

function showNotification(message, type = "success") {
  const notification = document.createElement("div");
  notification.style.cssText = `
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 16px 24px;
    background: ${type === "success" ? "#10b981" : "#ef4444"};
    color: white;
    border-radius: 8px;
    font-weight: 500;
    z-index: 10000;
    animation: slideIn 0.3s ease;
  `;
  notification.textContent = message;
  document.body.appendChild(notification);

  setTimeout(() => {
    notification.style.animation = "slideOut 0.3s ease";
    setTimeout(() => notification.remove(), 300);
  }, 3000);
}
</script>

</body>
</html>
