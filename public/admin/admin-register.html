<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Admin Registration</title>

<link rel="stylesheet" href="../css/style.css">

<style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:#f4f6fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
width:350px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
border:none;
background:#2c7be5;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1a5ed8;
}

.verify-section{
margin-top:20px;
border-top:1px solid #ddd;
padding-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h2>Admin Registration</h2>

<form id="adminRegister">

<input type="text" id="name" placeholder="Full Name" required>

<input type="email" id="email" placeholder="Email Address" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit">Register</button>

</form>


<div class="verify-section">

<h3>Verify Admin</h3>

<input type="text" id="code" placeholder="Enter Code from QR">

<button onclick="verifyAdmin()">Verify Code</button>

</div>

</div>


<script src="../js/admin.js"></script>

</body>

</html>
